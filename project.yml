name: ios-avfaudio-20260302-160722-wdedev
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.ios-avfaudio-20260302-160722-wdedev
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  App:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: AVFAudio Speaker
        UIApplicationSupportsIndirectInputEvents: YES
        NSMicrophoneUsageDescription: This app uses the microphone to convert your voice to text.
        NSSpeechRecognitionUsageDescription: This app uses speech recognition to transcribe your voice.
        NSCameraUsageDescription: This app uses the camera to capture photos for spoken details.
        NSPhotoLibraryUsageDescription: This app uses your photo library to analyze and read image details.
        UILaunchScreen: {}
    scheme:
      testTargets: []
